<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA BIBBIA - POZZALLO</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2592/2592231.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; letter-spacing: -0.5px; overflow-x: hidden; }
        .gold-text { color: #FFCC00; }
        .gold-border { border: 1px solid #FFCC00; }
        .no-blur { filter: blur(0) grayscale(0) !important; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        .blurred-img { filter: blur(35px) grayscale(1); transition: 0.8s; }
    </style>
</head>
<body class="p-4 pb-40">

    <audio id="audio-notifica" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto"></audio>

    <div id="welcome" class="fixed inset-0 bg-black flex flex-col justify-center items-center z-50 p-6 text-center">
        <h1 id="trigger" class="text-4xl font-black gold-text mb-2 cursor-pointer tracking-tighter">LA BIBBIA</h1>
        <p class="text-[10px] text-zinc-600 mb-10 uppercase tracking-[0.5em]">Pozzallo ti osserva</p>
        <button onclick="document.getElementById('welcome').style.display='none'; document.getElementById('audio-notifica').play();" 
                class="gold-border px-12 py-5 font-bold uppercase hover:bg-yellow-500 hover:text-black transition-all">
            ENTRA NEL PECCATO
        </button>
    </div>

    <div class="max-w-xl mx-auto flex justify-between items-end mb-8 border-b border-zinc-900 pb-4">
        <div>
            <h2 class="text-3xl font-black gold-text tracking-tighter text-shadow-lg">PZ_DATABASE</h2>
            <p class="text-[8px] text-zinc-500 font-bold uppercase">Secret Feed v3.0 // OMNIA</p>
        </div>
        <div class="text-right">
            <div class="flex items-center justify-end gap-1 text-red-600">
                <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-ping"></span>
                <span id="online-count" class="text-xs font-bold">1407</span>
            </div>
            <p class="text-[7px] text-zinc-700 uppercase font-black tracking-widest text-shadow">Live Connessioni</p>
        </div>
    </div>

    <div id="feed" class="space-y-6 max-w-xl mx-auto"></div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-black border-t border-zinc-900 z-40 bg-opacity-95 backdrop-blur-md">
        <div class="max-w-xl mx-auto">
            <div id="preview-area" class="hidden mb-3">
                <img id="img-preview" class="h-20 w-20 object-cover gold-border rounded shadow-[0_0_15px_rgba(255,204,0,0.3)]">
            </div>
            <div class="flex items-center gap-3">
                <label class="cursor-pointer text-2xl hover:scale-110 transition active:scale-95">
                    📷 <input type="file" id="file-input" class="hidden" accept="image/*">
                </label>
                <input id="input" type="text" placeholder="Sussurra un segreto..." autocomplete="off"
                       class="flex-1 bg-zinc-950 border-b border-zinc-800 p-2 text-sm text-white focus:outline-none focus:border-yellow-600 transition-all">
                <button onclick="invia()" class="bg-yellow-600 text-black px-5 py-2 font-black text-xs uppercase active:scale-90 transition-all shadow-lg">Invia</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let isAdmin = localStorage.getItem('isAdmin') === 'true';

        // ACCESSO ENIGMISTA (5 tap sul titolo)
        document.getElementById('trigger').addEventListener('click', () => {
            window.clicks = (window.clicks || 0) + 1;
            if (window.clicks === 5) {
                const pw = prompt("IDENTIFICATI, ENIGMISTA:");
                if (pw === "POZZALLO95") { 
                    isAdmin = true; 
                    localStorage.setItem('isAdmin', 'true');
                    alert("POTERE CONCESSO."); 
                    location.reload();
                }
                window.clicks = 0;
            }
        });

        const fileInput = document.getElementById('file-input');
        let base64Image = null;

        fileInput.onchange = e => {
            const reader = new FileReader();
            reader.onload = () => { 
                base64Image = reader.result;
                document.getElementById('img-preview').src = base64Image;
                document.getElementById('preview-area').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function invia() {
            const input = document.getElementById('input');
            if (input.value || base64Image) {
                socket.emit('nuovo_segreto', { testo: input.value, foto: base64Image });
                input.value = '';
                base64Image = null;
                document.getElementById('preview-area').classList.add('hidden');
            }
        }

        socket.on('carica_storico', (segreti) => {
            document.getElementById('feed').innerHTML = '';
            segreti.forEach(s => rendering(s));
        });

        socket.on('pubblica_segreto', (s) => {
            rendering(s);
            document.getElementById('audio-notifica').play();
        });

        socket.on('update_segreto', (s) => {
            rendering(s);
        });

        function rendering(s) {
            const isSbloccato = !s.blur || isAdmin;
            const percentuale = Math.min(Math.round((s.likes / s.targetLikes) * 100), 100);
            
            let div = document.getElementById(`post-${s.id}`);
            const nuovo = !div;
            if (nuovo) {
                div = document.createElement('div');
                div.id = `post-${s.id}`;
            }

            div.className = 'animate-fade-in gold-border bg-zinc-950 p-4 rounded-lg relative overflow-hidden shadow-2xl mb-6';
            
            div.innerHTML = `
                <div class="flex justify-between items-center text-[8px] text-zinc-500 mb-3 font-black tracking-widest border-b border-zinc-900 pb-2">
                    <span>SESSION_ID: ${s.id % 10000}</span>
                    <span class="gold-text uppercase font-bold tracking-tighter">🔥 ${s.likes} BRUCIA</span>
                </div>

                ${s.foto ? `
                    <div class="relative overflow-hidden rounded mb-3 bg-black border border-zinc-900 flex justify-center">
                        <img src="${s.foto}" class="max-h-[350px] w-full object-contain ${!isSbloccato ? 'blurred-img' : 'no-blur'}">
                        ${!isSbloccato ? `
                            <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/50 backdrop-blur-md">
                                <span class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.3em] mb-2 shadow-black">PECCATO BLOCCATO</span>
                                <div class="w-40 h-1 bg-zinc-900 rounded-full border border-zinc-800">
                                    <div class="h-full bg-yellow-500 shadow-[0_0_8px_#FFCC00]" style="width: ${percentuale}%"></div>
                                </div>
                                <span class="text-[8px] text-zinc-500 mt-2 uppercase font-black italic">Hype: ${percentuale}%</span>
                            </div>
                        ` : ''}
                    </div>
                ` : ''}

                <p class="text-sm leading-relaxed text-zinc-200 font-medium mb-5">${s.testo}</p>
                
                <div class="flex justify-between items-center pt-3 border-t border-zinc-900">
                    <button onclick="socket.emit('add_like', ${s.id})" 
                            class="bg-yellow-600 text-black px-6 py-2 text-[10px] font-black uppercase active:scale-95 transition-all shadow-md">
                        🔥 BRUCIA
                    </button>

                    <div class="flex items-center gap-4">
                        ${isAdmin ? `
                            <button onclick="socket.emit('admin_pump', ${s.id})" class="text-green-500 text-[9px] font-black border border-green-500/30 px-2 rounded">+50</button>
                            <button onclick="socket.emit('admin_unblur', ${s.id})" class="text-blue-500 text-[9px] font-black underline uppercase">Rivela</button>
                            <button onclick="socket.emit('admin_elimina', ${s.id})" class="text-red-600 text-[9px] font-black underline uppercase ml-2">X</button>
                        ` : `
                            <span class="text-[7px] text-zinc-700 uppercase italic font-bold">${new Date(s.id).toLocaleTimeString()} // LOG</span>
                        `}
                    </div>
                </div>
            `;
            
            if (nuovo) document.getElementById('feed').prepend(div);
        }

        // CONTATORE PARANOIA
        setInterval(() => {
            document.getElementById('online-count').innerText = 1400 + Math.floor(Math.random() * 85);
        }, 2500);
    </script>
</body>
</html>
